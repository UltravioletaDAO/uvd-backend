# Backend CI — UltravioletaDAO
# Quality gates only: tests del Lambda + terraform fmt/validate/tflint/checkov.
#
# Deploy mechanics:
#   - Frontend (uvdweb): AWS Amplify auto-deploy en push (no GitHub Actions).
#   - Backend  (este repo): `terraform apply` manual desde la maquina del dueno.
# Por eso este workflow NO incluye plan/apply: no se exponen AWS secrets en CI.
name: Backend CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: '1.14.3'

permissions:
  contents: read

jobs:
  # 1 ── Tests unitarios del Lambda ──────────────────────────────────
  lambda-tests:
    name: Lambda Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/new-applicants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/new-applicants/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (jest)
        run: npm test

  # 2 ── Quality gates de Terraform (todo offline, sin AWS) ──────────
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: fmt check
        run: terraform fmt -check -recursive

      - name: validate
        working-directory: environments/prod
        run: |
          terraform init -backend=false
          terraform validate

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      # --minimum-failure-severity=error: las warnings de buena practica
      # (required_version, required_providers en modulos legados) se reportan
      # pero no rompen el build. Solo errores reales hacen fallar.
      - run: tflint --init && tflint --recursive --minimum-failure-severity=error

      # checkov soft_fail: reporta hallazgos de seguridad sin bloquear.
      # Endurecer a soft_fail:false cuando los findings esten triados.
      - name: checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true
